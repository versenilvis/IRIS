

run:
    timeout: 5m
    tests: true

linters:
    disable-all: true
    enable:
        - errcheck
        - govet
        - staticcheck
        - errorlint
        - errname
        - bodyclose
        - sqlclosecheck
        - noctx
        - ineffassign
        - unconvert
        - bidichk

linters-settings:
    errcheck:
        check-type-assertions: true
        check-blank: true

    govet:
        enable-all: true
        disable:
            - fieldalignment

issues:
    exclude-use-default: false
    max-issues-per-linter: 0
    max-same-issues: 0
